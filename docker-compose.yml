services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: netmap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: netmap
      POSTGRES_PASSWORD: netmap123
      POSTGRES_DB: netmap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - netmap
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netmap"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── InfluxDB ────────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7-alpine
    container_name: netmap-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: netmap123456
      DOCKER_INFLUXDB_INIT_ORG: netmap
      DOCKER_INFLUXDB_INIT_BUCKET: network_metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: netmap-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    networks:
      - netmap
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: netmap-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - netmap
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  # network_mode: host é necessário para SNMP/ICMP alcançar dispositivos reais.
  # O backend se conecta ao postgres, influxdb e redis via 127.0.0.1 (portas expostas).
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netmap-backend
    restart: unless-stopped
    environment:
      # Banco de dados
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: netmap
      POSTGRES_PASSWORD: netmap123
      POSTGRES_DB: netmap
      # InfluxDB
      INFLUXDB_URL: http://127.0.0.1:8086
      INFLUXDB_TOKEN: netmap-super-secret-token
      INFLUXDB_ORG: netmap
      INFLUXDB_BUCKET: network_metrics
      INFLUXDB_RETENTION_DAYS: "7"
      # Redis
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_DB: "0"
      # JWT e segurança — ALTERE EM PRODUÇÃO
      JWT_SECRET_KEY: "ALTERE_ESTA_CHAVE_EM_PRODUCAO_USE_UMA_STRING_LONGA_E_ALEATORIA"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "30"
      # Admin padrão (criado na primeira execução)
      DEFAULT_ADMIN_USERNAME: "admin"
      DEFAULT_ADMIN_PASSWORD: "netmap@2024"
      DEFAULT_ADMIN_EMAIL: "admin@netmap.local"
      # Polling
      DEBUG: "false"
      POLL_INTERVAL_STATUS: "30"
      POLL_INTERVAL_INTERFACES: "60"
      POLL_INTERVAL_DISCOVERY: "300"
      # Retenção de logs
      LOG_RETENTION_DAYS: "7"
      LOG_CLEANUP_INTERVAL_HOURS: "6"
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    network_mode: host

  # ── Frontend (React + Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netmap-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - netmap
    depends_on:
      - backend

volumes:
  postgres_data:
  influxdb_data:

networks:
  netmap:
    driver: bridge
