services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: netmap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: netmap
      POSTGRES_PASSWORD: netmap123
      POSTGRES_DB: netmap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - netmap
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netmap"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── InfluxDB ────────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7-alpine
    container_name: netmap-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: netmap123456
      DOCKER_INFLUXDB_INIT_ORG: netmap
      DOCKER_INFLUXDB_INIT_BUCKET: network_metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: netmap-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    networks:
      - netmap
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  # NOTA: usa network_mode host para alcançar dispositivos SNMP na rede local.
  # Por isso, os outros serviços se comunicam com o backend via 127.0.0.1.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netmap-backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: netmap
      POSTGRES_PASSWORD: netmap123
      POSTGRES_DB: netmap
      INFLUXDB_URL: http://127.0.0.1:8086
      INFLUXDB_TOKEN: netmap-super-secret-token
      INFLUXDB_ORG: netmap
      INFLUXDB_BUCKET: network_metrics
      DEBUG: "false"
      POLL_INTERVAL_STATUS: "30"
      POLL_INTERVAL_INTERFACES: "60"
      POLL_INTERVAL_DISCOVERY: "300"
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    # network_mode host é necessário para SNMP/ICMP alcançar dispositivos reais
    network_mode: host

  # ── Frontend (React + Nginx) ────────────────────────────────────────────────
  # O Nginx faz proxy para o backend via 127.0.0.1 (host network do backend)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netmap-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - netmap
    extra_hosts:
      - "backend:host-gateway"
    depends_on:
      - backend

volumes:
  postgres_data:
  influxdb_data:

networks:
  netmap:
    driver: bridge
